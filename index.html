<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FlightScope · 直飞航线探索</title>
<meta name="description" content="交互式 3D 地球直飞航线查询工具：输入出发机场，可视化全球直飞目的地与参考航班信息（示例数据）。">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%233fd6ff' d='M21.5 15.5v-2l-8.5-5V3a1.5 1.5 0 0 0-3 0v5.5l-8.5 5v2l8.5-2.5v5l-2.5 2v1.5l4-1 4 1V20l-2.5-2v-5z'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#04070f; --bg-1:#0a1120;
    --glass:rgba(12,20,40,.66); --glass-2:rgba(16,27,54,.55); --glass-hi:rgba(30,48,92,.55);
    --line:rgba(122,168,255,.14); --line-2:rgba(122,198,255,.32);
    --cyan:#3fd6ff; --cyan-soft:rgba(63,214,255,.14); --amber:#ffb454; --amber-soft:rgba(255,180,84,.14);
    --t1:#e8f1ff; --t2:#9db1d6; --t3:#64789e;
    --ok:#3ddc97; --danger:#ff7a7a;
    --r-lg:16px; --r-md:12px; --r-sm:9px;
    --font-disp:'Space Grotesk',-apple-system,'Segoe UI',sans-serif;
    --font-body:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif;
    --font-mono:'JetBrains Mono',ui-monospace,Consolas,monospace;
    --ease:cubic-bezier(.22,.8,.28,1);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg-0);color:var(--t1);font-family:var(--font-body);overflow:hidden}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}
  :focus-visible{outline:2px solid var(--cyan);outline-offset:2px;border-radius:4px}

  #app{display:flex;width:100%;height:100vh;height:100dvh}

  /* ---------------- left panel ---------------- */
  .panel{
    width:392px;min-width:392px;height:100%;display:flex;flex-direction:column;z-index:5;
    background:linear-gradient(180deg,rgba(10,17,34,.92),rgba(6,10,22,.94));
    border-right:1px solid var(--line);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  }
  .brand{display:flex;align-items:center;gap:11px;padding:20px 20px 14px}
  .brand-logo{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;flex:none;
    background:linear-gradient(135deg,rgba(63,214,255,.18),rgba(63,214,255,.04));border:1px solid var(--line-2)}
  .brand-logo svg{width:21px;height:21px;fill:var(--cyan)}
  .brand h1{font:600 17px/1.2 var(--font-disp);margin:0;letter-spacing:.02em}
  .brand p{margin:2px 0 0;font-size:11px;color:var(--t3);letter-spacing:.14em;text-transform:uppercase}
  .demo-chip{margin-left:auto;flex:none;font-size:10px;font-weight:600;letter-spacing:.06em;color:var(--amber);
    background:var(--amber-soft);border:1px solid rgba(255,180,84,.3);padding:4px 8px;border-radius:99px;white-space:nowrap}

  .search-zone{padding:4px 20px 0;position:relative}
  .field{position:relative;margin-bottom:10px}
  .field label{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;letter-spacing:.1em;color:var(--t3);text-transform:uppercase;margin:0 0 6px 2px}
  .field label .dot{width:7px;height:7px;border-radius:50%;flex:none}
  .input-wrap{position:relative;display:flex;align-items:center}
  .input-wrap svg.lead{position:absolute;left:12px;width:15px;height:15px;fill:none;stroke:var(--t3);stroke-width:1.8;pointer-events:none}
  .input-wrap input{
    width:100%;height:46px;padding:0 40px 0 36px;border-radius:var(--r-md);color:var(--t1);
    background:var(--glass-2);border:1px solid var(--line);font:500 14px var(--font-body);
    transition:border-color .18s,box-shadow .18s;
  }
  .input-wrap input::placeholder{color:var(--t3)}
  .input-wrap input:focus{outline:none;border-color:var(--line-2);box-shadow:0 0 0 3px rgba(63,214,255,.12)}
  .clear-btn{position:absolute;right:6px;width:30px;height:30px;border:0;border-radius:8px;background:transparent;color:var(--t3);
    display:none;place-items:center;cursor:pointer}
  .clear-btn:hover{background:var(--glass-hi);color:var(--t1)}
  .clear-btn svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none}
  .input-wrap.has-value .clear-btn{display:grid}
  .swap-row{display:flex;justify-content:center;margin:-4px 0 6px}
  .swap-btn{width:34px;height:30px;border-radius:9px;border:1px solid var(--line);background:var(--glass-2);color:var(--t2);
    display:grid;place-items:center;cursor:pointer;transition:.18s}
  .swap-btn:hover{color:var(--cyan);border-color:var(--line-2);transform:scale(1.06)}
  .swap-btn svg{width:15px;height:15px;stroke:currentColor;stroke-width:1.8;fill:none}

  .ac-list{position:absolute;left:20px;right:20px;z-index:30;margin-top:4px;max-height:284px;overflow:auto;
    background:rgba(9,15,31,.97);border:1px solid var(--line-2);border-radius:var(--r-md);
    box-shadow:0 18px 50px rgba(0,0,0,.6);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
  .ac-item{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;border-bottom:1px solid rgba(122,168,255,.06)}
  .ac-item:last-child{border-bottom:0}
  .ac-item.active,.ac-item:hover{background:var(--cyan-soft)}
  .ac-code{font:600 13px var(--font-mono);color:var(--cyan);width:44px;flex:none}
  .ac-name{font-size:13px;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ac-sub{margin-left:auto;font-size:11px;color:var(--t3);flex:none}

  .chips{display:flex;flex-wrap:wrap;gap:7px;padding:2px 20px 12px}
  .chips span{font-size:10.5px;color:var(--t3);width:100%;letter-spacing:.08em;text-transform:uppercase;margin-bottom:-1px}
  .chip{border:1px solid var(--line);background:var(--glass-2);color:var(--t2);border-radius:99px;
    font:500 12px var(--font-mono);padding:6px 12px;cursor:pointer;transition:.16s}
  .chip:hover{color:var(--cyan);border-color:var(--line-2);background:var(--cyan-soft)}

  .stats{display:flex;align-items:baseline;gap:16px;padding:10px 20px;border-top:1px solid var(--line)}
  .stat b{font:600 22px var(--font-disp);color:var(--t1);font-variant-numeric:tabular-nums}
  .stat small{display:block;font-size:10.5px;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-top:1px}
  .stat.accent b{color:var(--cyan)}
  .partial-note{padding:0 20px 8px;font-size:11px;color:var(--amber);display:none}

  .sort-row{display:flex;gap:6px;padding:0 20px 10px}
  .sort-btn{border:1px solid var(--line);background:transparent;color:var(--t3);font-size:11.5px;font-weight:500;
    border-radius:8px;padding:5px 10px;cursor:pointer;transition:.15s}
  .sort-btn.on{color:var(--cyan);border-color:var(--line-2);background:var(--cyan-soft)}
  .filter-row{display:flex;flex-wrap:wrap;gap:6px;padding:0 20px 10px;align-items:center}
  .filter-row .fl-label{font-size:10px;color:var(--t3);letter-spacing:.06em;text-transform:uppercase;margin-right:2px}
  .fchip{border:1px solid var(--line);background:transparent;color:var(--t2);font-size:11.5px;font-weight:500;
    border-radius:99px;padding:4.5px 11px;cursor:pointer;transition:.15s;white-space:nowrap}
  .fchip:hover{color:var(--cyan);border-color:var(--line-2)}
  .fchip.on{color:#04070f;background:var(--cyan);border-color:var(--cyan);font-weight:600}
  .fchip.amber.on{background:var(--amber);border-color:var(--amber)}
  .filter-row select{background:var(--glass-2);color:var(--t1);border:1px solid var(--line);border-radius:8px;
    font:500 11.5px var(--font-body);padding:5px 8px;cursor:pointer;max-width:150px}

  #list{flex:1;overflow-y:auto;padding:2px 14px 10px;scrollbar-width:thin;scrollbar-color:rgba(122,168,255,.25) transparent}
  #list::-webkit-scrollbar{width:8px}
  #list::-webkit-scrollbar-thumb{background:rgba(122,168,255,.18);border-radius:4px}

  .empty-state{margin:26px 14px;text-align:center;color:var(--t3);font-size:13px;line-height:1.7}
  .empty-state svg{width:38px;height:38px;stroke:var(--t3);fill:none;stroke-width:1.4;margin-bottom:8px;opacity:.7}

  /* destination card */
  .dest-card{display:flex;align-items:center;gap:12px;margin:6px 6px;padding:11px 12px;border-radius:var(--r-md);
    background:var(--glass-2);border:1px solid var(--line);cursor:pointer;transition:border-color .16s,background .16s,transform .16s;
    animation:cardIn .34s var(--ease) both}
  .dest-card:hover,.dest-card.hi{border-color:var(--line-2);background:var(--glass-hi);transform:translateX(2px)}
  @keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .dest-code{font:600 15px var(--font-mono);color:var(--cyan);width:52px;flex:none}
  .dest-code small{display:block;font:400 9.5px var(--font-mono);color:var(--t3);letter-spacing:.04em}
  .dest-mid{min-width:0;flex:1}
  .dest-city{font:600 14px var(--font-disp);color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dest-meta{font-size:11px;color:var(--t3);margin-top:2px;font-variant-numeric:tabular-nums}
  .dest-right{text-align:right;flex:none}
  .dest-price{font:600 14px var(--font-mono);color:var(--amber)}
  .dest-price small{font-size:9px;color:var(--t3);display:block;letter-spacing:.05em}
  .carrier-dots{display:flex;gap:3px;justify-content:flex-end;margin-top:4px}
  .carrier-dots i{width:14px;height:14px;border-radius:50%;font:600 7.5px/14px var(--font-mono);text-align:center;color:#04070f;font-style:normal}

  /* flight card */
  .flight-card{margin:6px 6px;padding:12px 13px;border-radius:var(--r-md);background:var(--glass-2);
    border:1px solid var(--line);animation:cardIn .34s var(--ease) both}
  .flight-card:hover{border-color:var(--line-2)}
  .fc-top{display:flex;align-items:center;gap:9px}
  .al-logo{width:26px;height:26px;border-radius:50%;flex:none;display:grid;place-items:center;
    font:600 9.5px var(--font-mono);color:#04070f}
  .fc-airline{font-size:12.5px;font-weight:600;color:var(--t1);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .fc-no{font:600 12px var(--font-mono);color:var(--cyan)}
  .fc-ac{margin-left:auto;font:500 10.5px var(--font-mono);color:var(--t2);background:var(--glass-hi);
    border:1px solid var(--line);padding:2.5px 7px;border-radius:6px;flex:none}
  .fc-route{display:flex;align-items:center;gap:10px;margin-top:11px}
  .fc-time{font:600 17px var(--font-mono);color:var(--t1);font-variant-numeric:tabular-nums}
  .fc-time small{display:block;font:400 10px var(--font-mono);color:var(--t3);margin-top:1px;letter-spacing:.04em}
  .fc-time .plus1{color:var(--amber);font-size:10px;vertical-align:super}
  .fc-line{flex:1;position:relative;height:16px;min-width:40px}
  .fc-line::before{content:"";position:absolute;left:0;right:0;top:8px;border-top:1px dashed rgba(122,168,255,.35)}
  .fc-line svg{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) rotate(90deg);width:13px;height:13px;fill:var(--t2)}
  .fc-dur{position:absolute;left:50%;transform:translateX(-50%);top:-9px;font:500 9.5px var(--font-mono);color:var(--t3);white-space:nowrap}
  .fc-bottom{display:flex;align-items:center;margin-top:10px;padding-top:9px;border-top:1px solid rgba(122,168,255,.08)}
  .fc-days{font:500 10px var(--font-mono);color:var(--t3);letter-spacing:.06em}
  .fc-price{margin-left:auto;font:600 16px var(--font-mono);color:var(--amber)}
  .fc-price small{font-size:9.5px;color:var(--t3);margin-left:3px}

  .route-head{display:flex;align-items:center;gap:9px;margin:10px 6px 4px;padding:11px 13px;border-radius:var(--r-md);
    background:linear-gradient(120deg,rgba(63,214,255,.1),rgba(255,180,84,.07));border:1px solid var(--line-2)}
  .route-head .rh-codes{font:600 15px var(--font-mono);color:var(--t1);letter-spacing:.02em}
  .route-head .rh-codes svg{width:13px;height:13px;fill:var(--cyan);vertical-align:-1px;margin:0 4px}
  .route-head .rh-sub{margin-left:auto;font-size:11px;color:var(--t2);text-align:right}

  .panel-foot{padding:10px 20px 14px;border-top:1px solid var(--line);font-size:10.5px;line-height:1.6;color:var(--t3)}
  .panel-foot b{color:var(--amber);font-weight:600}

  /* ---------------- globe stage ---------------- */
  .stage{position:relative;flex:1;min-width:0;height:100%;
    background:radial-gradient(115% 90% at 55% 40%,#0c162e 0%,#060b1a 50%,#03040a 100%)}
  #holder{position:absolute;inset:0}
  #holder canvas{display:block;touch-action:none;cursor:grab}
  #holder canvas:active{cursor:grabbing}
  .stage-controls{position:absolute;right:16px;top:16px;z-index:6;display:flex;gap:8px}
  .g-btn{height:34px;min-width:34px;padding:0 11px;border-radius:9px;border:1px solid var(--line);
    background:rgba(14,23,46,.62);color:#cfe0ff;font:600 11.5px var(--font-body);letter-spacing:.02em;
    cursor:pointer;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:.16s;display:inline-flex;align-items:center;gap:6px}
  .g-btn:hover{border-color:var(--line-2);background:rgba(30,48,92,.7);color:#fff}
  .g-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8}
  .stage-hint{position:absolute;right:18px;bottom:14px;z-index:6;font-size:11px;color:var(--t3);letter-spacing:.04em;pointer-events:none}
  .map-load{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:6;pointer-events:none;
    font:500 10.5px var(--font-mono);letter-spacing:.16em;text-transform:uppercase;color:#7f96c2;transition:opacity .4s}
  .map-load::before{content:"";display:inline-block;width:7px;height:7px;margin-right:9px;border-radius:50%;
    background:var(--cyan);box-shadow:0 0 10px var(--cyan);animation:pulse 1.1s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}

  .g-tip{position:absolute;z-index:7;pointer-events:none;min-width:150px;max-width:240px;padding:11px 13px;border-radius:11px;
    opacity:0;transform:translateY(6px);transition:opacity .14s,transform .14s;
    background:rgba(9,15,31,.9);border:1px solid var(--line-2);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    box-shadow:0 12px 40px rgba(0,0,0,.55)}
  .g-tip.on{opacity:1;transform:none}
  .g-tip .tp-code{font:600 12px var(--font-mono);color:var(--cyan)}
  .g-tip .tp-city{font:600 14px var(--font-disp);color:#fff;margin:2px 0 1px}
  .g-tip .tp-sub{font-size:11px;color:var(--t2);font-variant-numeric:tabular-nums}
  .g-tip .tp-cta{font-size:10px;color:var(--amber);margin-top:7px;letter-spacing:.03em}

  .fallback{position:absolute;inset:0;display:none;place-items:center;color:var(--t3);font-size:13px;z-index:8}

  @media (max-width:880px){
    #app{flex-direction:column}
    .stage{order:1;height:44%;flex:none}
    .panel{order:2;width:100%;min-width:0;flex:1;min-height:0;overflow-y:auto;
      border-right:0;border-top:1px solid var(--line)}
    #list{flex:none;overflow:visible}         /* whole panel scrolls as one sheet */
    .brand{padding:12px 16px 8px}
    .search-zone{padding:0 16px}
    .ac-list{left:16px;right:16px}
    .input-wrap input{font-size:16px;height:48px}   /* ≥16px: no iOS focus auto-zoom */
    .chip{padding:9px 14px;font-size:13px}          /* bigger touch targets */
    .sort-btn,.fchip{padding:8px 13px;font-size:12.5px}
    .g-btn{height:38px}
  }
  @media (prefers-reduced-motion:reduce){
    .dest-card,.flight-card{animation:none}
    *{transition-duration:.01ms!important}
  }
</style>
</head>
<body>
<div id="app">
  <!-- ================= left panel ================= -->
  <aside class="panel">
    <div class="brand">
      <div class="brand-logo" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M21.5 15.5v-2l-8.5-5V3a1.5 1.5 0 0 0-3 0v5.5l-8.5 5v2l8.5-2.5v5l-2.5 2v1.5l4-1 4 1V20l-2.5-2v-5z"/></svg>
      </div>
      <div>
        <h1>FlightScope</h1>
        <p data-i18n="tagline">直飞航线探索</p>
      </div>
    </div>

    <div class="search-zone">
      <div class="field">
        <label for="inp-o"><span class="dot" style="background:var(--cyan);box-shadow:0 0 8px var(--cyan)"></span><span data-i18n="from">出发地</span></label>
        <div class="input-wrap" id="wrap-o">
          <svg class="lead" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
          <input id="inp-o" type="text" autocomplete="off" spellcheck="false" data-i18n-ph="phFrom" placeholder="城市 / 机场代码，如 马尼拉 或 MNL" aria-label="出发地">
          <button class="clear-btn" id="clr-o" aria-label="清除出发地" tabindex="-1"><svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6 6 18"/></svg></button>
        </div>
      </div>
      <div class="swap-row">
        <button class="swap-btn" id="btn-swap" aria-label="交换起点与终点" title="交换">
          <svg viewBox="0 0 24 24"><path d="M7 4v13m0 3-3.5-3.5M7 20l3.5-3.5M17 20V7m0-3 3.5 3.5M17 4l-3.5 3.5"/></svg>
        </button>
      </div>
      <div class="field">
        <label for="inp-d"><span class="dot" style="background:var(--amber);box-shadow:0 0 8px var(--amber)"></span><span data-i18n="to">目的地（可选）</span></label>
        <div class="input-wrap" id="wrap-d">
          <svg class="lead" viewBox="0 0 24 24"><path d="M12 21s7-6.1 7-11a7 7 0 1 0-14 0c0 4.9 7 11 7 11z"/><circle cx="12" cy="10" r="2.6"/></svg>
          <input id="inp-d" type="text" autocomplete="off" spellcheck="false" data-i18n-ph="phTo" placeholder="留空 = 查看全部直飞目的地" aria-label="目的地">
          <button class="clear-btn" id="clr-d" aria-label="清除目的地" tabindex="-1"><svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6 6 18"/></svg></button>
        </div>
      </div>
      <div class="ac-list" id="ac" role="listbox" style="display:none"></div>
    </div>

    <div class="chips" id="chips">
      <span data-i18n="hot">热门出发地</span>
    </div>

    <div class="stats" aria-live="polite">
      <div class="stat accent"><b id="st-dest">—</b><small data-i18n="stDest">直飞目的地</small></div>
      <div class="stat"><b id="st-flt">—</b><small data-i18n="stFlt">参考航班/日</small></div>
      <div class="stat"><b id="st-al">—</b><small data-i18n="stAl">承运航司</small></div>
    </div>
    <div class="partial-note" id="partial-note" data-i18n="partialNote">该机场仅收录与菲律宾 / 中国相关的航线</div>

    <div class="sort-row" id="sort-row" style="display:none">
      <button class="sort-btn on" data-sort="dist" data-i18n="sortDist">按距离</button>
      <button class="sort-btn" data-sort="price" data-i18n="sortPrice">按价格</button>
      <button class="sort-btn" data-sort="flights" data-i18n="sortFlt">按航班数</button>
    </div>
    <div class="filter-row" id="region-row" style="display:none"></div>
    <div class="filter-row" id="flt-filter" style="display:none"></div>

    <div id="list" role="list">
      <div class="empty-state" id="empty-init">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3.5 9h17M3.5 15h17M12 3a17 17 0 0 1 0 18M12 3a17 17 0 0 0 0 18"/></svg>
        <div data-i18n="emptyInit">输入出发机场，探索全球直飞航线<br>或点击上方热门出发地快速开始</div>
      </div>
    </div>

    <div class="panel-foot">

    var olt=labelTex(o.code+" · "+cityName(o));
    var olab=new THREE.Sprite(new THREE.SpriteMaterial({map:olt,transparent:true,depthWrite:false,opacity:.95}));
    var osc=0.085; olab.scale.set(olt.userData.w*osc,olt.userData.h*osc,1);
    olab.center.set(0.05,-0.6); originGrp.add(olab);
    net.add(originGrp);
    for(var ri=0;ri<3;ri++){
      var ring=new THREE.Sprite(new THREE.SpriteMaterial({map:RING,color:0xffb454,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false,opacity:0}));
      ring.position.copy(oPos); ring.userData={phase:ri/3}; net.add(ring); rings.push(ring);
    }

    var now=performance.now();
    dests.sort(function(a,b){return a.dist-b.dist;});
    var showLabels = dests.length<=40;   // big hubs: labels on hover only (skip texture cost)
    dests.forEach(function(d,i){
      var B=AIRPORTS[d.code];
      var a=latLon(o.lat,o.lon,R), b=latLon(B.lat,B.lon,R);
      var seg=d.dist<2000?32:(d.dist<6000?48:64);
      var curve=new THREE.CatmullRomCurve3(arcPts(a,b,seg));
      var sel=!!state.dest;
      var col=sel?0xffb454:0x3fd6ff;
      var grp=new THREE.Group();
      /* end-fade via vertex colors: with additive blending, dark ends add ~nothing,
         so dozens of arcs stacking at the origin no longer blow out to white */
      function endFade(geo,radial){
        var n=geo.attributes.position.count, ring=radial+1, rings=n/ring-1, cbuf=new Float32Array(n*3);
        for(var vi=0;vi<n;vi++){ var t=Math.floor(vi/ring)/rings;
          var b=Math.min(1,Math.min(t,1-t)/0.16); b=0.05+0.95*b*b;
          cbuf[vi*3]=b;cbuf[vi*3+1]=b;cbuf[vi*3+2]=b; }
        geo.setAttribute('color',new THREE.BufferAttribute(cbuf,3)); return geo;
      }
      var halo=new THREE.Mesh(endFade(new THREE.TubeGeometry(curve,seg,0.95,6,false),6),
        new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.045,blending:THREE.AdditiveBlending,depthWrite:false,vertexColors:true}));
      var core=new THREE.Mesh(endFade(new THREE.TubeGeometry(curve,seg,0.32,6,false),6),
        new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.38,blending:THREE.AdditiveBlending,depthWrite:false,vertexColors:true}));
      grp.add(halo);grp.add(core);net.add(grp);
      var idxPerSeg=6*6; /* radialSegments(6) * 6 indices */
      var arc={grp:grp,halo:halo,core:core,curve:curve,seg:seg,idxPerSeg:idxPerSeg,dest:d.code,
               born:now+(state.reduced?0:Math.min(i,90)*22),drawn:state.reduced?1:0,baseCore:.38,baseHalo:.045};
      if(!state.reduced){ halo.geometry.setDrawRange(0,0); core.geometry.setDrawRange(0,0); }
      arcs.push(arc);

      /* destination marker */
      var mPos=latLon(B.lat,B.lon,R*1.006);
      var mg=new THREE.Group(); mg.position.copy(mPos);
      var glow=new THREE.Sprite(new THREE.SpriteMaterial({map:GLOW,color:sel?0xffcf87:0x9fd8ff,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false,opacity:0}));
      glow.scale.setScalar(7.5); mg.add(glow);
      var dot=new THREE.Mesh(new THREE.SphereGeometry(1.05,10,10),new THREE.MeshBasicMaterial({color:0xffffff}));
      mg.add(dot);
      var lab=null;
      if(showLabels){
        var lt=labelTex(B.code);
        lab=new THREE.Sprite(new THREE.SpriteMaterial({map:lt,transparent:true,depthWrite:false,opacity:0}));
        var sc=0.075; lab.scale.set(lt.userData.w*sc,lt.userData.h*sc,1);
        lab.center.set(-0.15,0.5); mg.add(lab);
      }
      net.add(mg);
      markers.push({grp:mg,glow:glow,lab:lab,code:d.code,world:new THREE.Vector3(),sx:0,sy:0,facing:0,
                    born:arc.born+(state.reduced?0:420),data:d});

      /* planes on selected route (or ambient on first few arcs) */
      var wantPlane = sel || (i<8);
      if(wantPlane && !state.reduced){
        var pn=sel?Math.min(2,d.flights.length):1;
        for(var k=0;k<pn;k++){
          var sp=new THREE.Sprite(new THREE.SpriteMaterial({map:PLANE,color:sel?0xffd9a0:0xbfeaff,transparent:true,depthWrite:false,opacity:0}));
          sp.scale.setScalar(4.6); net.add(sp);
          planes.push({sp:sp,curve:curve,t:(k*0.5+((h32(d.code)%40)/100))%1,speed:0.028+ (h32(d.code+k)%12)/1000,arcRef:arc});
        }
      }
      G.destIndex.push(markers[markers.length-1]);
    });
  }
  G.buildNetwork=buildNetwork;

  /* ---- interaction ---- */
  var rotX=0.18,rotY=-2.05,dragging=false,lx=0,ly=0,velX=0,velY=0,moved=0,downT=0;
  var flyAnim=null;
  function flyTo(code,cb){
    var ap=AIRPORTS[code]; if(!ap) return;
    var p=latLon(ap.lat,ap.lon,1);
    var ty=Math.atan2(-p.x,p.z), tx=Math.atan2(p.y,Math.sqrt(p.x*p.x+p.z*p.z));
    tx=Math.max(-1.15,Math.min(1.15,tx));
    var sy=rotY, sx=rotX;
    var dy=ty-((sy%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
    /* shortest wrap */
    var cur=((sy%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
    dy=ty-cur; if(dy>Math.PI)dy-=Math.PI*2; if(dy<-Math.PI)dy+=Math.PI*2;
    if(state.reduced){ rotY=sy+dy; rotX=tx; if(cb)cb(); return; }
    flyAnim={t0:performance.now(),dur:1050,sy:sy,sx:sx,dy:dy,dx:tx-sx,cb:cb};
  }
  G.flyTo=flyTo;

  var dom=renderer.domElement;
  var touches={};                                    /* pointerId -> [x,y] (for pinch zoom) */
  function touchCount(){ return Object.keys(touches).length; }
  function pinchDist(){ var k=Object.keys(touches),a=touches[k[0]],b=touches[k[1]]; return Math.hypot(a[0]-b[0],a[1]-b[1]); }
  var pinchStart=0, pinchZ0=0;
  dom.addEventListener('pointerdown',function(e){
    touches[e.pointerId]=[e.clientX,e.clientY];
    if(touchCount()===2){ dragging=false; pinchStart=pinchDist(); pinchZ0=camera.position.z; return; }
    dragging=true;lx=e.clientX;ly=e.clientY;moved=0;downT=Date.now();velX=velY=0;flyAnim=null;dom.setPointerCapture(e.pointerId);
  });
  window.addEventListener('pointermove',function(e){
    if(touches[e.pointerId]) touches[e.pointerId]=[e.clientX,e.clientY];
    if(touchCount()===2){                            /* pinch to zoom */
      var d=pinchDist();
      if(pinchStart>0&&d>0) camera.position.z=Math.max(165,Math.min(460,pinchZ0*pinchStart/d));
      return;
    }
    if(dragging){var dx=e.clientX-lx,dy=e.clientY-ly;lx=e.clientX;ly=e.clientY;moved+=Math.abs(dx)+Math.abs(dy);
      rotY+=dx*0.006;rotX+=dy*0.006;rotX=Math.max(-1.15,Math.min(1.15,rotX));velY=dx*0.006;velX=dy*0.006;}
    hover(e);
  });
  window.addEventListener('pointerup',function(e){
    delete touches[e.pointerId];
    if(touchCount()<2) pinchStart=0;
    if(dragging&&moved<6&&(Date.now()-downT)<400&&state.hoveredDest>=0){
      var mk=markers[state.hoveredDest];
      if(mk){ UI.selectDest(mk.code); }
    }
    dragging=false;
  });
  window.addEventListener('pointercancel',function(e){ delete touches[e.pointerId]; if(touchCount()<2)pinchStart=0; dragging=false; });
  dom.addEventListener('wheel',function(e){e.preventDefault();camera.position.z=Math.max(165,Math.min(460,camera.position.z+e.deltaY*0.12));},{passive:false});
  dom.addEventListener('pointerleave',function(){if(!dragging){state.hoveredDest=-1;tipEl.classList.remove('on');}});

  var tipEl=document.getElementById('tip');
  function hover(e){
    if(dragging)return;
    var rect=dom.getBoundingClientRect();
    if(e.clientX<rect.left||e.clientX>rect.right||e.clientY<rect.top||e.clientY>rect.bottom){return;}
    var mx=e.clientX-rect.left,my=e.clientY-rect.top,best=-1,bd=22;
    for(var i=0;i<markers.length;i++){var m=markers[i];if(m.facing<0.1)continue;
      var d=Math.hypot(m.sx-mx,m.sy-my);if(d<bd){bd=d;best=i;}}
    if(best!==state.hoveredDest){ state.hoveredDest=best; UI.syncListHighlight(best>=0?markers[best].code:null); }
    if(best>=0){showTip(markers[best],rect);}else{tipEl.classList.remove('on');}
  }
  function showTip(m,rect){
    var B=AIRPORTS[m.code], d=m.data;
    var html='<div class="tp-code">'+m.code+'</div><div class="tp-city">'+cityName(B)+'</div>'+
      '<div class="tp-sub">'+d.dist.toLocaleString()+' km · '+d.flights.length+' '+T('flightsDay')+'</div>'+
      '<div class="tp-sub" style="color:var(--amber)">'+T('tipFrom')+' ¥'+d.minPrice+'</div>'+
      (state.dest?'':'<div class="tp-cta">'+T('tipCta')+'</div>');
    tipEl.innerHTML=html;tipEl.classList.add('on');
    var tx=m.sx+16,ty=m.sy-12;
    if(tx+250>rect.width)tx=m.sx-250;if(ty<6)ty=6;
    tipEl.style.left=tx+'px';tipEl.style.top=ty+'px';
  }

  document.getElementById('btn-rot').addEventListener('click',function(){
    state.autoRotate=!state.autoRotate;
    this.setAttribute('aria-pressed',state.autoRotate);
    this.querySelector('span').textContent=state.autoRotate?T('rotOn'):T('rotOff');
  });
  document.getElementById('btn-reset').addEventListener('click',function(){
    camera.position.z=315;
    if(state.origin){flyTo(state.origin);}else{rotX=0.18;rotY=-2.05;}
    velX=velY=0;
  });

  /* ---- render loop ---- */
  var clock=new THREE.Clock(),camDir=new THREE.Vector3(),tmp=new THREE.Vector3(),tmp2=new THREE.Vector3();
  function ease(t){return t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}
  function animate(){
    requestAnimationFrame(animate);
    var dt=Math.min(0.05,clock.getDelta()),now=performance.now();
    if(flyAnim){
      var k=Math.min(1,(now-flyAnim.t0)/flyAnim.dur),e2=ease(k);
      rotY=flyAnim.sy+flyAnim.dy*e2; rotX=flyAnim.sx+flyAnim.dx*e2;
      if(k>=1){var cb=flyAnim.cb;flyAnim=null;if(cb)cb();}
    } else if(!dragging){
      rotY+=velY;rotX+=velX;velY*=0.93;velX*=0.93;rotX=Math.max(-1.15,Math.min(1.15,rotX));
      if(state.autoRotate&&!state.origin)rotY+=0.0014;
    }
    globe.rotation.y=rotY;globe.rotation.x=rotX;globe.updateWorldMatrix(true,false);
    camDir.copy(camera.position).normalize();
    var Wc=stage.clientWidth,Hc=stage.clientHeight;

    /* arcs draw-in */
    for(var i=0;i<arcs.length;i++){var a=arcs[i];
      if(a.drawn<1){
        var t=(now-a.born)/620; if(t<0)t=0; if(t>1)t=1;
        a.drawn=t; var e3=1-Math.pow(1-t,3);
        var segs=Math.floor(e3*a.seg);
        a.core.geometry.setDrawRange(0,segs*a.idxPerSeg);
        a.halo.geometry.setDrawRange(0,segs*a.idxPerSeg);
      }
      var hov=state.hoveredDest>=0&&markers[state.hoveredDest]&&markers[state.hoveredDest].code===a.dest;
      var anyHov=state.hoveredDest>=0;
      var tc=anyHov?(hov?0.95:0.10):a.baseCore;
      var th=anyHov?(hov?0.22:0.03):a.baseHalo;
      a.core.material.opacity+=(tc-a.core.material.opacity)*0.12;
      a.halo.material.opacity+=(th-a.halo.material.opacity)*0.12;
    }
    /* markers */
    for(var m2=0;m2<markers.length;m2++){var m=markers[m2];
      m.grp.getWorldPosition(m.world);tmp.copy(m.world).normalize();
      m.facing=tmp.dot(camDir);
      var v=m.world.clone().project(camera);
      m.sx=(v.x*0.5+0.5)*Wc;m.sy=(-v.y*0.5+0.5)*Hc;
      var vis=now>m.born;
      var hov2=(state.hoveredDest===m2);
      var gt=vis?(state.hoveredDest>=0?(hov2?0.95:0.12):(0.28+0.34*Math.max(0,m.facing))):0;
      m.glow.material.opacity+=(gt-m.glow.material.opacity)*0.14;
      m.glow.scale.setScalar(5.2+(hov2?3.2:0));
      if(m.lab){
        var lt2=vis&&m.facing>0.3?(state.hoveredDest>=0?(hov2?1:0.1):(markers.length<=28?0.85:0)):0;
        if(markers.length>28&&hov2)lt2=1;
        m.lab.material.opacity+=(lt2-m.lab.material.opacity)*0.16;
      }
    }
    /* origin rings */
    for(var r2=0;r2<rings.length;r2++){var rg=rings[r2];
      var ph=((now/1800)+rg.userData.phase)%1;
      rg.scale.setScalar(4+ph*26);
      rg.material.opacity=(1-ph)*0.5;
    }
    if(originGrp){
      originGrp.getWorldPosition(tmp2);
      var of=tmp2.clone().normalize().dot(camDir);
      originGrp.visible=of>-0.1;
      for(var r3=0;r3<rings.length;r3++)rings[r3].visible=of>0.05;
    }
    /* planes */
    for(var p2=0;p2<planes.length;p2++){var pl=planes[p2];
      if(pl.arcRef.drawn<1){pl.sp.material.opacity=0;continue;}
      pl.t+=dt*pl.speed;if(pl.t>1)pl.t-=1;
      pl.curve.getPointAt(pl.t,tmp);
      pl.sp.position.copy(tmp);                       /* local coords (child of globe) */
      var wpos=tmp.applyMatrix4(globe.matrixWorld);    /* -> world (tmp already copied) */
      var w1=wpos.clone().project(camera);
      var pf=wpos.clone().normalize().dot(camDir);
      var t2=Math.min(1,pl.t+0.012);
      pl.curve.getPointAt(t2,tmp2);
      var w2=tmp2.applyMatrix4(globe.matrixWorld).clone().project(camera);
      pl.sp.material.rotation=Math.atan2(w2.y-w1.y,w2.x-w1.x);
      var fade=Math.sin(Math.PI*pl.t);
      var anyH=state.hoveredDest>=0;
      var mine=anyH&&markers[state.hoveredDest]&&markers[state.hoveredDest].code===pl.arcRef.dest;
      pl.sp.material.opacity=(pf>0?1:0)*fade*(anyH?(mine?1:0.08):0.9);
    }
    renderer.render(scene,camera);
  }
  animate();

  function onResize(){var W2=stage.clientWidth,H2=stage.clientHeight;camera.aspect=W2/H2;camera.updateProjectionMatrix();renderer.setSize(W2,H2);}
  if(window.ResizeObserver){new ResizeObserver(onResize).observe(stage);}else{window.addEventListener('resize',onResize);}
}

/* =====================================================================
   UI LAYER
   ===================================================================== */
var UI={};
function initUI(){
  var inpO=document.getElementById('inp-o'),inpD=document.getElementById('inp-d');
  var ac=document.getElementById('ac'),listEl=document.getElementById('list');
  var acItems=[],acActive=-1,acTarget=null;

  /* ---- search ---- */
  function searchAirports(q){
    q=q.trim().toLowerCase(); if(!q)return[];
    var res=[];
    for(var i=0;i<AP_LIST.length;i++){
      var ap=AP_LIST[i], pos=ap.hay.indexOf(q);
      if(pos<0) continue;
      var score, cl=ap.code.toLowerCase();
      if(cl===q) score=1000;
      else if(cl.indexOf(q)===0) score=820;
      else if(ap.cityZh===q||ap.cityEn.toLowerCase()===q) score=600;
      else if(ap.cityEn.toLowerCase().indexOf(q)===0||ap.cityZh.indexOf(q)===0) score=440;
      else score=200-Math.min(120,pos);
      score += Math.min(80,(DEG[ap.code]||0)*0.6);   // prioritise busier hubs
      res.push([score,ap]);
    }
    res.sort(function(a,b){return b[0]-a[0];});
    return res.slice(0,8).map(function(x){return x[1];});
  }
  function renderAc(items,target){
    acItems=items;acActive=-1;acTarget=target;
    if(!items.length){ac.style.display='none';return;}
    ac.innerHTML=items.map(function(ap,i){
      return '<div class="ac-item" role="option" data-i="'+i+'">'+
        '<span class="ac-code">'+ap.code+'</span>'+
        '<span class="ac-name">'+cityName(ap)+' · '+apName(ap)+'</span>'+
        '<span class="ac-sub">'+ap.country+'</span></div>';
    }).join('');
    var top=(target===inpO?document.getElementById('wrap-o'):document.getElementById('wrap-d'));
    ac.style.top=(top.offsetTop+top.offsetHeight+2)+'px';
    ac.style.display='block';
    Array.prototype.forEach.call(ac.children,function(el){
      el.addEventListener('pointerdown',function(e){e.preventDefault();pick(+el.getAttribute('data-i'));});
    });
  }
  function hideAc(){ac.style.display='none';acItems=[];acActive=-1;}
  function pick(i){
    var ap=acItems[i];if(!ap)return;
    if(acTarget===inpO){ setOrigin(ap.code); } else { setDest(ap.code); }
    hideAc();
  }
  function onKey(e){
    if(ac.style.display==='none')return;
    if(e.key==='ArrowDown'||e.key==='ArrowUp'){
      e.preventDefault();
      acActive+=(e.key==='ArrowDown'?1:-1);
      acActive=(acActive+acItems.length)%acItems.length;
      Array.prototype.forEach.call(ac.children,function(el,i){el.classList.toggle('active',i===acActive);});
    } else if(e.key==='Enter'){ e.preventDefault(); pick(acActive>=0?acActive:0); }
    else if(e.key==='Escape'){ hideAc(); }
  }
  [inpO,inpD].forEach(function(inp){
    inp.addEventListener('input',function(){
      document.getElementById(inp===inpO?'wrap-o':'wrap-d').classList.toggle('has-value',!!inp.value);
      renderAc(searchAirports(inp.value),inp);
    });
    inp.addEventListener('focus',function(){ if(inp.value)renderAc(searchAirports(inp.value),inp); });
    inp.addEventListener('keydown',onKey);
    inp.addEventListener('blur',function(){ setTimeout(hideAc,140); });
  });
  document.getElementById('clr-o').addEventListener('click',function(){ setOrigin(null); });
  document.getElementById('clr-d').addEventListener('click',function(){ setDest(null); });
  document.getElementById('btn-swap').addEventListener('click',function(){
    var o=state.origin,d=state.dest;
    if(!o&&!d)return;
    if(d&&ROUTE_MAP[d]){ state.origin=d; state.dest=(o&&(ROUTE_MAP[d]||{})[o])?o:(o||null); }
    else if(o&&!d){ return; }
    else { return; }
    syncInputs(); G.buildNetwork(); G.flyTo(state.origin); renderList();
  });

  /* hot chips */
  var HOT=['MNL','CEB','PVG','PEK','CAN','XMN'];
  var chipsEl=document.getElementById('chips');
  HOT.forEach(function(c){
    var b=document.createElement('button');b.className='chip';
    b.textContent=c+' '+(AIRPORTS[c]?cityName(AIRPORTS[c]):'');
    b.addEventListener('click',function(){setOrigin(c);});
    b.setAttribute('data-chip',c);
    chipsEl.appendChild(b);
  });
  function refreshChips(){
    Array.prototype.forEach.call(chipsEl.querySelectorAll('.chip'),function(b){
      var c=b.getAttribute('data-chip');
      b.textContent=c+' '+cityName(AIRPORTS[c]);
    });
  }

  /* ---- selection ---- */
  function setOrigin(code){
    state.origin=code; state.hoveredDest=-1; state.region='all'; state.timeBand='all'; state.alFilter='all';
    if(!code || state.dest===code){ state.dest=null; }   /* keep pre-entered destination */
    if(code){ state.autoRotate=false; }
    var rb=document.getElementById('btn-rot');
    rb.setAttribute('aria-pressed',state.autoRotate);
    rb.querySelector('span').textContent=state.autoRotate?T('rotOn'):T('rotOff');
    syncInputs();
    G.buildNetwork();
    if(code)G.flyTo(code);
    renderList();
  }
  function setDest(code){
    state.timeBand='all'; state.alFilter='all';
    if(code&&!state.origin){ state.dest=code; syncInputs(); renderList(); return; }
    if(code&&state.origin&&!(ROUTE_MAP[state.origin]||{})[code]){ state.dest=code; syncInputs(); G.buildNetwork(); renderList(); return; }
    state.dest=code;
    syncInputs(); G.buildNetwork(); renderList();
  }
  UI.selectDest=function(code){ setDest(code); };
  function syncInputs(){
    inpO.value=state.origin?(state.origin+' · '+cityName(AIRPORTS[state.origin])):'';
    inpD.value=state.dest?(state.dest+' · '+cityName(AIRPORTS[state.dest])):'';
    document.getElementById('wrap-o').classList.toggle('has-value',!!state.origin);
    document.getElementById('wrap-d').classList.toggle('has-value',!!state.dest);
    var pn=document.getElementById('partial-note');
    pn.style.display='none';
  }

  /* ---- sorting ---- */
  document.getElementById('sort-row').addEventListener('click',function(e){
    var b=e.target.closest('.sort-btn');if(!b)return;
    state.sort=b.getAttribute('data-sort');
    Array.prototype.forEach.call(this.querySelectorAll('.sort-btn'),function(x){x.classList.toggle('on',x===b);});
    renderList();
  });

  /* ---- list render ---- */
  function setStats(nd,nf,na){
    document.getElementById('st-dest').textContent=nd==null?'—':nd;
    document.getElementById('st-flt').textContent=nf==null?'—':nf;
    document.getElementById('st-al').textContent=na==null?'—':na;
  }
  function timeBandOf(m){ m=((m%1440)+1440)%1440; return m<360?'night':(m<720?'morning':(m<1080?'afternoon':'evening')); }
  var regRow=document.getElementById('region-row'), fltFilter=document.getElementById('flt-filter');
  function renderRegionRow(){
    var regs=availableRegions();
    if(regs.length<=1){ regRow.style.display='none'; regRow.innerHTML=''; state.region='all'; return; }
    var h='<button class="fchip'+(state.region==='all'?' on':'')+'" data-reg="all">'+T('regAll')+'</button>';
    regs.forEach(function(r){ h+='<button class="fchip'+(state.region===r?' on':'')+'" data-reg="'+r+'">'+T('reg'+r)+'</button>'; });
    regRow.innerHTML=h; regRow.style.display='flex';
    Array.prototype.forEach.call(regRow.querySelectorAll('.fchip'),function(ch){
      ch.addEventListener('click',function(){ state.region=ch.getAttribute('data-reg'); G.buildNetwork(); renderList(); });
    });
  }
  function renderFlightFilter(flAll){
    var als={}; flAll.forEach(function(f){als[f.al]=1;}); var alCodes=Object.keys(als);
    var bands=[['all','ffAll'],['morning','ffMorning'],['afternoon','ffAfternoon'],['evening','ffEvening'],['night','ffNight']];
    var h='<span class="fl-label">'+T('ffTime')+'</span>';
    bands.forEach(function(b){ h+='<button class="fchip amber'+(state.timeBand===b[0]?' on':'')+'" data-tb="'+b[0]+'">'+T(b[1])+'</button>'; });
    if(alCodes.length>1){
      h+='<select id="al-sel" aria-label="'+T('ffAirline')+'"><option value="all">'+T('ffAirline')+' · '+T('ffAll')+'</option>';
      alCodes.forEach(function(c){ h+='<option value="'+c+'"'+(state.alFilter===c?' selected':'')+'>'+alName(c)+'</option>'; });
      h+='</select>';
    }
    fltFilter.innerHTML=h; fltFilter.style.display='flex';
    Array.prototype.forEach.call(fltFilter.querySelectorAll('.fchip'),function(ch){
      ch.addEventListener('click',function(){ state.timeBand=ch.getAttribute('data-tb'); renderList(); });
    });
    var sel=fltFilter.querySelector('#al-sel');
    if(sel) sel.addEventListener('change',function(){ state.alFilter=sel.value; renderList(); });
  }
  function renderList(){
    var el=listEl;
    if(!state.origin){
      document.getElementById('sort-row').style.display='none';
      regRow.style.display='none'; fltFilter.style.display='none';
      setStats(null,null,null);
      el.innerHTML='<div class="empty-state"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3.5 9h17M3.5 15h17M12 3a17 17 0 0 1 0 18M12 3a17 17 0 0 0 0 18"/></svg><div>'+
        T(state.dest?'emptyNeedOrigin':'emptyInit')+'</div></div>';
      return;
    }
    if(state.dest){
      var sel=getDestinations(state.origin).filter(function(d){return d.code===state.dest;});
      var o=AIRPORTS[state.origin],B=AIRPORTS[state.dest];
      document.getElementById('sort-row').style.display='none'; regRow.style.display='none';
      if(!sel.length){
        fltFilter.style.display='none';
        setStats(0,0,0);
        el.innerHTML='<div class="empty-state"><svg viewBox="0 0 24 24"><path d="M12 3v4m0 10v4M3 12h4m10 0h4"/><circle cx="12" cy="12" r="9"/></svg><div>'+T('emptyNoRoute')+'</div></div>';
        return;
      }
      var d=sel[0],flAll=d.flights.slice();
      flAll.sort(function(a,b){return a.price-b.price;});
      var alsAll={};flAll.forEach(function(f){alsAll[f.al]=1;});
      setStats(1,flAll.length,Object.keys(alsAll).length);
      renderFlightFilter(flAll);
      var fl=flAll.filter(function(f){
        if(state.alFilter!=='all'&&f.al!==state.alFilter) return false;
        if(state.timeBand!=='all'&&timeBandOf(f.dep)!==state.timeBand) return false;
        return true;
      });
      var html='<div class="route-head"><span class="rh-codes">'+state.origin+
        '<svg viewBox="0 0 24 24"><path d="M21.5 15.5v-2l-8.5-5V3a1.5 1.5 0 0 0-3 0v5.5l-8.5 5v2l8.5-2.5v5l-2.5 2v1.5l4-1 4 1V20l-2.5-2v-5z"/></svg>'+state.dest+
        '</span><span class="rh-sub">'+d.dist.toLocaleString()+' km · '+fl.length+'/'+flAll.length+' '+T('routeFlights')+'</span></div>';
      if(!fl.length){ html+='<div class="empty-state" style="margin:18px 14px">'+T('ffNoMatch')+'</div>'; }
      fl.forEach(function(f,i){
        html+='<div class="flight-card" style="animation-delay:'+(state.reduced?0:Math.min(i,20)*36)+'ms">'+
          '<div class="fc-top"><span class="al-logo" style="background:'+alColor(f.al)+'">'+f.al+'</span>'+
          '<span class="fc-airline">'+alName(f.al)+'</span><span class="fc-no">'+f.no+'</span>'+
          '<span class="fc-ac">'+f.ac+'</span></div>'+
          '<div class="fc-route">'+
            '<div class="fc-time">'+fmtTime(f.dep)+'<small>'+state.origin+'</small></div>'+
            '<div class="fc-line"><span class="fc-dur">'+fmtDur(f.dur)+'</span><svg viewBox="0 0 24 24"><path d="M21.5 15.5v-2l-8.5-5V3a1.5 1.5 0 0 0-3 0v5.5l-8.5 5v2l8.5-2.5v5l-2.5 2v1.5l4-1 4 1V20l-2.5-2v-5z"/></svg></div>'+
            '<div class="fc-time">'+fmtTime(f.arr)+(f.plus>0?'<span class="plus1">+1</span>':'')+'<small>'+state.dest+'</small></div>'+
          '</div>'+
          '<div class="fc-bottom"><span class="fc-days">'+T('daily')+'</span>'+
          '<span class="fc-price">¥'+f.price+'<small>'+T('priceRef')+'</small></span></div></div>';
      });
      el.innerHTML=html;
      return;
    }
    /* network mode */
    document.getElementById('sort-row').style.display='flex';
    fltFilter.style.display='none';
    renderRegionRow();
    var dests=currentDestinations();
    var nf=0,als={};
    dests.forEach(function(d){nf+=d.flights.length;d.carriers.forEach(function(c){als[c]=1;});});
    setStats(dests.length,nf,Object.keys(als).length);
    if(state.sort==='dist')dests.sort(function(a,b){return a.dist-b.dist;});
    else if(state.sort==='price')dests.sort(function(a,b){return a.minPrice-b.minPrice;});
    else dests.sort(function(a,b){return b.flights.length-a.flights.length;});
    var html='';
    dests.forEach(function(d,i){
      var B=AIRPORTS[d.code];
      var dots=d.carriers.slice(0,4).map(function(c){
        return '<i style="background:'+alColor(c)+'" title="'+alName(c)+'">'+c.charAt(0)+'</i>';
      }).join('');
      html+='<div class="dest-card" role="listitem" tabindex="0" data-code="'+d.code+'" style="animation-delay:'+(state.reduced?0:Math.min(i,16)*30)+'ms">'+
        '<div class="dest-code">'+d.code+'<small>'+(B.cc||'')+'</small></div>'+
        '<div class="dest-mid"><div class="dest-city">'+cityName(B)+'</div>'+
        '<div class="dest-meta">'+d.dist.toLocaleString()+' km · '+d.flights.length+' '+T('flightsDay')+' · '+d.carriers.length+' '+T('carriersN')+'</div></div>'+
        '<div class="dest-right"><div class="dest-price">¥'+d.minPrice+'<small>'+T('priceRef')+'</small></div>'+
        '<div class="carrier-dots">'+dots+'</div></div></div>';
    });
    el.innerHTML=html;
    Array.prototype.forEach.call(el.querySelectorAll('.dest-card'),function(card){
      var code=card.getAttribute('data-code');
      card.addEventListener('click',function(){setDest(code);});
      card.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();setDest(code);}});
      card.addEventListener('mouseenter',function(){highlightMarker(code,true);});
      card.addEventListener('mouseleave',function(){highlightMarker(code,false);});
    });
  }
  function highlightMarker(code,on){
    if(!G.destIndex)return;
    if(!on){ state.hoveredDest=-1; return; }
    for(var i=0;i<G.destIndex.length;i++){
      if(G.destIndex[i].code===code){ state.hoveredDest=i; return; }
    }
  }
  UI.syncListHighlight=function(code){
    Array.prototype.forEach.call(listEl.querySelectorAll('.dest-card'),function(card){
      card.classList.toggle('hi',code&&card.getAttribute('data-code')===code);
    });
  };
  UI.renderList=renderList;

  /* language */
  document.getElementById('btn-lang').addEventListener('click',function(){
    LANG=LANG==='zh'?'en':'zh';
    applyI18n(); refreshChips(); syncInputs(); renderList();
    if(state.origin){ G.buildNetwork(); } /* rebuild labels in new language */
  });

  applyI18n();
  renderList();
}

/* ---- bootstrap (runs last, after all vars & functions are defined) ---- */
(function initWait(){
  var tries=0;
  (function w(){
    if(typeof THREE==='undefined'){ if(tries++<160){ return setTimeout(w,50); }
      document.getElementById('fallback').style.display='grid'; return; }
    try{ initGlobe(); initUI(); }
    catch(e){ console.error(e); document.getElementById('fallback').style.display='grid'; }
  })();
})();
</script>
</body>
</html>
